name: reminder_app
description: A Flutter reminder app for birthdays, events, and tasks.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Database ✅ iOS OK
  sqflite: ^2.3.3+1
  path: ^1.9.0
  
  # UI ✅ iOS OK
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  
  # Notifications ✅ iOS FIXED
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.2 
  flutter_native_timezone: ^2.0.0  # ✅ iOS Timezone
  permission_handler: ^11.3.1
  
  # Local storage ✅ iOS OK
  shared_preferences: ^2.3.2
  
  # Share + QR ✅ iOS OK
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # iOS Icons
  assets:
    - ios/Runner/Assets.xcassets/AppIcon.appiconset/